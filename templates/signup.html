{% extends "base.html" %}

{% block title %}Sign Up - School Attendance System{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-gray-950 to-gray-800 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-gray-900 border border-gray-800 rounded-lg shadow-xl p-8">
            <h1 class="text-3xl font-bold text-center mb-2 text-blue-400">Create School Account</h1>
            <p class="text-center text-gray-400 mb-8">Sign up to manage your school attendance</p>

            {% if error %}
            <div class="bg-red-900/30 border border-red-700/50 rounded-lg p-4 mb-6 text-red-200">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('signup') }}" class="space-y-5">
                <div>
                    <label for="school_name" class="block text-sm font-medium text-gray-300 mb-2">School Name</label>
                    <input
                        type="text"
                        id="school_name"
                        name="school_name"
                        required
                        class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-white"
                        placeholder="e.g., St. Mary's School"
                    >
                </div>

                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Admin Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        minlength="3"
                        class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-white"
                        placeholder="Choose a username (min 3 chars)"
                    >
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        minlength="6"
                        class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-white"
                        placeholder="Min 6 characters"
                    >
                </div>

                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-300 mb-2">Confirm Password</label>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        required
                        minlength="6"
                        class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-white"
                        placeholder="Confirm your password"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200"
                >
                    Create Account
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-400 text-sm">
                    Already have an account?
                    <a href="{{ url_for('login') }}" class="text-blue-400 hover:text-blue-300">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

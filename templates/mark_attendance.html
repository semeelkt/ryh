{% extends "base.html" %}

{% block title %}Mark Attendance - Attendance System{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-950">
    <!-- Header -->
    <nav class="bg-gray-900 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="{{ url_for('teacher_dashboard') }}" class="text-2xl font-bold text-blue-400">← Dashboard</a>
            <a href="{{ url_for('logout') }}" class="bg-red-700 hover:bg-red-800 px-4 py-2 rounded-lg text-sm">
                Logout
            </a>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-6">
        <div class="mb-8">
            <h1 class="text-3xl font-bold mb-2">Mark Attendance</h1>
            <p class="text-gray-400">Record attendance for your students</p>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
            <!-- Classroom & Date Selection -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div>
                    <label for="classroom_id" class="block text-sm font-medium text-gray-300 mb-2">Classroom</label>
                    <select
                        id="classroom_id"
                        class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-white"
                        onchange="loadClassroomStudents()"
                    >
                        <option value="">-- Select Classroom --</option>
                        {% for classroom in classrooms %}
                        <option value="{{ classroom.id }}">Class {{ classroom.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="attendance_date" class="block text-sm font-medium text-gray-300 mb-2">Date</label>
                    <input
                        type="date"
                        id="attendance_date"
                        class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-white"
                    >
                </div>

                <div>
                    <label for="period_name" class="block text-sm font-medium text-gray-300 mb-2">Period/Subject</label>
                    <input
                        type="text"
                        id="period_name"
                        placeholder="e.g., Mathematics"
                        class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-white"
                    >
                </div>
            </div>

            <!-- Students Table -->
            <div id="students-container" class="hidden">
                <h2 class="text-xl font-bold mb-4">Students</h2>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b border-gray-700">
                                <th class="text-left px-4 py-3 text-gray-300">Roll No</th>
                                <th class="text-left px-4 py-3 text-gray-300">Name</th>
                                <th class="text-left px-4 py-3 text-gray-300">Status</th>
                            </tr>
                        </thead>
                        <tbody id="students-list">
                        </tbody>
                    </table>
                </div>

                <div class="mt-8 flex gap-4">
                    <button
                        onclick="markAll('Present')"
                        class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-6 rounded-lg transition"
                    >
                        Mark All Present
                    </button>
                    <button
                        onclick="markAll('Absent')"
                        class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-6 rounded-lg transition"
                    >
                        Mark All Absent
                    </button>
                    <button
                        onclick="submitAttendance()"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition"
                    >
                        Submit Attendance
                    </button>
                </div>
            </div>

            <div id="no-students" class="text-center py-8 text-gray-400">
                Select a classroom to view students
            </div>
        </div>
    </div>
</div>

<script>
    // Set today's date as default
    document.getElementById('attendance_date').valueAsDate = new Date();

    let currentStudents = [];

    function loadClassroomStudents() {
        const classroomId = document.getElementById('classroom_id').value;
        const container = document.getElementById('students-container');
        const noStudents = document.getElementById('no-students');

        if (!classroomId) {
            container.classList.add('hidden');
            noStudents.classList.remove('hidden');
            return;
        }

        // Simulate loading students (in real app, this would fetch from API)
        fetch(`/api/classroom/${classroomId}/students`)
            .then(r => r.json())
            .then(data => {
                currentStudents = data;
                populateStudentTable(data);
                container.classList.remove('hidden');
                noStudents.classList.add('hidden');
            })
            .catch(err => {
                console.error('Error loading students:', err);
                // Fallback: show message
                noStudents.textContent = 'Unable to load students. Please try again.';
            });
    }

    function populateStudentTable(students) {
        const tbody = document.getElementById('students-list');
        tbody.innerHTML = students.map(student => `
            <tr class="border-b border-gray-700 hover:bg-gray-800">
                <td class="px-4 py-3 text-gray-300">${student.roll_no}</td>
                <td class="px-4 py-3 text-gray-300">${student.name}</td>
                <td class="px-4 py-3">
                    <div class="flex gap-2">
                        <button
                            onclick="setStatus(${student.id}, 'Present')"
                            class="px-3 py-1 rounded text-sm font-semibold transition status-btn-${student.id}"
                            id="btn-present-${student.id}"
                        >
                            Present
                        </button>
                        <button
                            onclick="setStatus(${student.id}, 'Absent')"
                            class="px-3 py-1 rounded text-sm font-semibold transition status-btn-${student.id}"
                            id="btn-absent-${student.id}"
                        >
                            Absent
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');

        // Reset all to absent by default
        currentStudents.forEach(student => {
            setStatus(student.id, 'Absent');
        });
    }

    const studentStatus = {};

    function setStatus(studentId, status) {
        studentStatus[studentId] = status;

        const presentBtn = document.getElementById(`btn-present-${studentId}`);
        const absentBtn = document.getElementById(`btn-absent-${studentId}`);

        presentBtn.classList.remove('bg-green-600', 'text-white');
        absentBtn.classList.remove('bg-red-600', 'text-white');
        presentBtn.classList.add('bg-gray-700', 'text-gray-400');
        absentBtn.classList.add('bg-gray-700', 'text-gray-400');

        if (status === 'Present') {
            presentBtn.classList.remove('bg-gray-700', 'text-gray-400');
            presentBtn.classList.add('bg-green-600', 'text-white');
        } else {
            absentBtn.classList.remove('bg-gray-700', 'text-gray-400');
            absentBtn.classList.add('bg-red-600', 'text-white');
        }
    }

    function markAll(status) {
        currentStudents.forEach(student => {
            setStatus(student.id, status);
        });
    }

    function submitAttendance() {
        const classroomId = document.getElementById('classroom_id').value;
        const date = document.getElementById('attendance_date').value;
        const periodName = document.getElementById('period_name').value;

        if (!classroomId || !date) {
            alert('Please select classroom and date');
            return;
        }

        const attendanceList = Object.entries(studentStatus).map(([studentId, status]) => ({
            student_id: parseInt(studentId),
            status: status
        }));

        fetch('{{ url_for("mark_attendance") }}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                classroom_id: parseInt(classroomId),
                date: date,
                period_name: periodName || 'General',
                attendance_list: attendanceList
            })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                alert('Attendance submitted successfully!');
                // Reset form
                document.getElementById('classroom_id').value = '';
                document.getElementById('students-container').classList.add('hidden');
                document.getElementById('no-students').classList.remove('hidden');
            } else {
                alert('Error: ' + (data.error || 'Unknown error'));
            }
        })
        .catch(err => {
            console.error('Error:', err);
            alert('Error submitting attendance');
        });
    }
</script>
{% endblock %}
